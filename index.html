<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>AI 語音助手</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ffffff15;flex-shrink:0}
.header h1{font-size:17px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-btns{display:flex;gap:6px}
.icon-btn{background:#ffffff10;border:1px solid #ffffff20;color:#e0e0e0;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:#ffffff20}
.icon-btn.active{background:#a78bfa40;border-color:#a78bfa;color:#a78bfa}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.6;font-size:15px;white-space:pre-wrap;word-break:break-word;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;border-bottom-right-radius:6px}
.msg.ai{align-self:flex-start;background:#1e1e30;border:1px solid #ffffff15;border-bottom-left-radius:6px}
.msg.ai .label{font-size:11px;color:#a78bfa;margin-bottom:4px}
.msg.system{align-self:center;background:#ffffff08;color:#888;font-size:13px;border-radius:12px}
.typing-dot{display:inline-block;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.search-card{align-self:flex-start;max-width:90%;background:#16213e;border:1px solid #a78bfa30;border-radius:14px;padding:10px 14px;font-size:13px;animation:fadeIn .3s}
.search-toggle{cursor:pointer;color:#a78bfa;font-weight:600;display:flex;align-items:center;gap:6px}
.search-toggle:hover{color:#c4b5fd}
.search-details{margin-top:8px;display:none;font-size:12px;color:#aaa;line-height:1.8}
.search-details.open{display:block}
.search-details a{color:#60a5fa;text-decoration:none}
.search-details a:hover{text-decoration:underline}
.search-item{padding:6px 0;border-bottom:1px solid #ffffff08}
.search-item:last-child{border:none}
.search-item .s-title{color:#60a5fa;font-weight:500}
.search-item .s-snip{color:#999;margin-top:2px}
.input-area{padding:12px 16px;background:#1a1a2e;border-top:1px solid #ffffff15;display:flex;align-items:center;gap:8px;flex-shrink:0}
.input-area input{flex:1;background:#ffffff10;border:1px solid #ffffff20;border-radius:24px;padding:10px 16px;color:#fff;font-size:15px;outline:none}
.input-area input::placeholder{color:#666}
.input-area input:focus{border-color:#a78bfa60}
.send-btn{background:linear-gradient(135deg,#7c3aed,#6366f1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mic-btn{background:#ffffff10;border:2px solid #ffffff20;color:#e0e0e0;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.recording{background:#ef444440;border-color:#ef4444;color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ef444440}50%{box-shadow:0 0 0 8px #ef444400}}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#00000080;z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#1e1e30;border:1px solid #ffffff15;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px;color:#a78bfa}
.modal .section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #ffffff10}
.modal .section:last-of-type{border:none}
.modal .section-title{font-size:14px;font-weight:600;color:#c4b5fd;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.modal label{display:block;font-size:12px;color:#aaa;margin-bottom:4px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;background:#ffffff10;border:1px solid #ffffff20;border-radius:8px;padding:8px 12px;color:#fff;font-size:14px;outline:none;font-family:inherit}
.modal textarea{height:70px;resize:vertical}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#a78bfa60}
.modal select option{background:#1e1e30}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;cursor:pointer}
.btn-save{background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff}
.btn-cancel{background:#ffffff10;color:#ccc;border:1px solid #ffffff20!important}
.radio-group{display:flex;gap:8px;margin-top:4px}
.radio-group label{display:flex;align-items:center;gap:4px;background:#ffffff08;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#ccc;border:1px solid transparent}
.radio-group input[type=radio]{accent-color:#a78bfa}
.radio-group label:has(input:checked){border-color:#a78bfa60;color:#a78bfa;background:#a78bfa15}
.slider-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.slider-row input[type=range]{flex:1;accent-color:#a78bfa}
.slider-row .val{font-size:13px;color:#a78bfa;min-width:30px;text-align:center}
.welcome{text-align:center;padding:30px 20px;color:#888}
.welcome .emoji{font-size:56px;margin-bottom:12px}
.welcome h2{font-size:20px;color:#a78bfa;margin-bottom:8px}
.welcome p{font-size:14px;line-height:1.8}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;padding:0 4px}
.preset-card{background:#ffffff08;border:1px solid #ffffff15;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .2s;font-size:12px}
.preset-card:hover{background:#a78bfa15;border-color:#a78bfa40}
.preset-card .p-icon{font-size:28px;margin-bottom:4px}
.preset-card .p-name{color:#ccc;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <h1>🤖 AI 語音助手</h1>
  <div class="header-btns">
    <button class="icon-btn" id="searchModeBtn" onclick="cycleSearchMode()" title="搜尋模式">🔍</button>
    <button class="icon-btn active" id="voiceToggle" onclick="toggleVoice()" title="語音播放">🔊</button>
    <button class="icon-btn" onclick="newChat()" title="新對話">🗑️</button>
    <button class="icon-btn" onclick="exportChat()" title="匯出對話">📤</button>
    <button class="icon-btn" onclick="showSettings()" title="設定">⚙️</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="emoji">🤖</div>
    <h2>AI 語音助手</h2>
    <p>支援語音對話 & 即時網路搜尋</p>
    <div class="presets">
      <div class="preset-card" onclick="applyPreset('chat')"><div class="p-icon">💬</div><div class="p-name">一般聊天</div></div>
      <div class="preset-card" onclick="applyPreset('search')"><div class="p-icon">🔍</div><div class="p-name">搜尋助手</div></div>
      <div class="preset-card" onclick="applyPreset('code')"><div class="p-icon">💻</div><div class="p-name">程式助手</div></div>
      <div class="preset-card" onclick="applyPreset('write')"><div class="p-icon">📝</div><div class="p-name">寫作助手</div></div>
      <div class="preset-card" onclick="applyPreset('translate')"><div class="p-icon">🌐</div><div class="p-name">翻譯助手</div></div>
      <div class="preset-card" onclick="applyPreset('data')"><div class="p-icon">📊</div><div class="p-name">資料分析</div></div>
    </div>
  </div>
</div>

<div class="input-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
  <input type="text" id="userInput" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter')sendMessage()">
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ 設定</h2>
    <div class="section">
      <div class="section-title">🔑 API 設定</div>
      <label>GitHub PAT Token</label>
      <input type="password" id="setToken" placeholder="ghp_xxxxxxxxx...">
      <label>AI 模型</label>
      <select id="setModel">
        <option value="gpt-4o-mini">GPT-4o Mini（速度快、省額度）</option>
        <option value="gpt-4o">GPT-4o（更聰明）</option>
        <option value="DeepSeek-R1">DeepSeek-R1（推理強）</option>
        <option value="Llama-3.3-70B-Instruct">Llama 3.3 70B（開源大模型）</option>
      </select>
      <label>Temperature（創意程度）</label>
      <div class="slider-row">
        <input type="range" id="setTemp" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempVal').textContent=this.value">
        <span class="val" id="tempVal">0.7</span>
      </div>
    </div>
    <div class="section">
      <div class="section-title">🤖 自訂指令</div>
      <label>關於我（讓 AI 了解你的背景）</label>
      <textarea id="setAboutMe" placeholder="例如：我是資訊部的工程師，主要用 Python 和 Java，工作在金融業..."></textarea>
      <label>回覆風格（你希望 AI 怎麼回答）</label>
      <textarea id="setStyle" placeholder="例如：用繁體中文、簡潔扼要、有條理、適時用 emoji..."></textarea>
    </div>
    <div class="section">
      <div class="section-title">🔍 搜尋設定</div>
      <label>網路搜尋模式</label>
      <div class="radio-group">
        <label><input type="radio" name="searchMode" value="auto" checked> 🤖 自動</label>
        <label><input type="radio" name="searchMode" value="always"> 🔍 總是搜尋</label>
        <label><input type="radio" name="searchMode" value="never"> ❌ 不搜尋</label>
      </div>
    </div>
    <div class="section">
      <div class="section-title">🔊 語音設定</div>
      <label>語音播放</label>
      <div class="radio-group">
        <label><input type="radio" name="voiceMode" value="on" checked> 開啟</label>
        <label><input type="radio" name="voiceMode" value="off"> 關閉</label>
      </div>
      <label>語速</label>
      <div class="slider-row">
        <input type="range" id="setRate" min="0.5" max="2" step="0.1" value="1.1" oninput="document.getElementById('rateVal').textContent=this.value">
        <span class="val" id="rateVal">1.1</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideSettings()">取消</button>
      <button class="btn-save" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>

<script>
/* ===== 全域變數 ===== */
const API_URL='https://models.inference.ai.azure.com/chat/completions';
const SEARCH_KEYWORDS=/最新|新聞|今天|天氣|目前|現在|最近|股價|匯率|即時|消息|報導|熱門|趨勢|誰是|什麼是|怎麼了|發生|latest|news|today|current|weather|price|recent|who is|what is/i;
const CORS_PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?'];
let chatHistory=[];
let voiceEnabled=true;
let speechRate=1.1;
let isRecording=false;
let recognition=null;
let currentController=null;
let searchMode='auto';
let allMessages=[];

/* ===== 初始化 ===== */
window.onload=()=>{
  loadSettings();
  if(!localStorage.getItem('pat_token'))setTimeout(showSettings,500);
  initSpeechRecognition();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  updateSearchBtn();
};

/* ===== 載入設定 ===== */
function loadSettings(){
  searchMode=localStorage.getItem('search_mode')||'auto';
  voiceEnabled=localStorage.getItem('voice_mode')!=='off';
  speechRate=parseFloat(localStorage.getItem('speech_rate'))||1.1;
  document.getElementById('voiceToggle').textContent=voiceEnabled?'🔊':'🔇';
  document.getElementById('voiceToggle').classList.toggle('active',voiceEnabled);
}

/* ===== 設定視窗 ===== */
function showSettings(){
  document.getElementById('setToken').value=localStorage.getItem('pat_token')||'';
  document.getElementById('setModel').value=localStorage.getItem('model')||'gpt-4o-mini';
  document.getElementById('setTemp').value=localStorage.getItem('temperature')||'0.7';
  document.getElementById('tempVal').textContent=document.getElementById('setTemp').value;
  document.getElementById('setAboutMe').value=localStorage.getItem('about_me')||'';
  document.getElementById('setStyle').value=localStorage.getItem('reply_style')||'用繁體中文、簡潔扼要、有條理';
  document.getElementById('setRate').value=localStorage.getItem('speech_rate')||'1.1';
  document.getElementById('rateVal').textContent=document.getElementById('setRate').value;
  const sm=localStorage.getItem('search_mode')||'auto';
  document.querySelector(`input[name=searchMode][value=${sm}]`).checked=true;
  const vm=localStorage.getItem('voice_mode')==='off'?'off':'on';
  document.querySelector(`input[name=voiceMode][value=${vm}]`).checked=true;
  document.getElementById('settingsModal').classList.add('show');
}
function hideSettings(){document.getElementById('settingsModal').classList.remove('show')}
function saveSettings(){
  const t=document.getElementById('setToken').value.trim();
  if(!t){alert('請輸入 PAT Token！');return}
  localStorage.setItem('pat_token',t);
  localStorage.setItem('model',document.getElementById('setModel').value);
  localStorage.setItem('temperature',document.getElementById('setTemp').value);
  localStorage.setItem('about_me',document.getElementById('setAboutMe').value);
  localStorage.setItem('reply_style',document.getElementById('setStyle').value);
  localStorage.setItem('search_mode',document.querySelector('input[name=searchMode]:checked').value);
  localStorage.setItem('voice_mode',document.querySelector('input[name=voiceMode]:checked').value);
  localStorage.setItem('speech_rate',document.getElementById('setRate').value);
  loadSettings();
  searchMode=localStorage.getItem('search_mode')||'auto';
  updateSearchBtn();
  hideSettings();
  addSystemMsg('✅ 設定已儲存！');
}

/* ===== 搜尋模式切換 ===== */
function cycleSearchMode(){
  const modes=['auto','always','never'];
  const i=(modes.indexOf(searchMode)+1)%3;
  searchMode=modes[i];
  localStorage.setItem('search_mode',searchMode);
  updateSearchBtn();
  const labels={auto:'🤖 自動搜尋',always:'🔍 總是搜尋',never:'❌ 不搜尋'};
  addSystemMsg(`搜尋模式：${labels[searchMode]}`);
}
function updateSearchBtn(){
  const b=document.getElementById('searchModeBtn');
  const m={auto:'🔍',always:'🔎',never:'🚫'};
  b.textContent=m[searchMode]||'🔍';
  b.classList.toggle('active',searchMode!=='never');
}

/* ===== 語音開關 ===== */
function toggleVoice(){
  voiceEnabled=!voiceEnabled;
  localStorage.setItem('voice_mode',voiceEnabled?'on':'off');
  const b=document.getElementById('voiceToggle');
  b.textContent=voiceEnabled?'🔊':'🔇';
  b.classList.toggle('active',voiceEnabled);
  if(!voiceEnabled)speechSynthesis.cancel();
}

/* ===== 新對話 ===== */
function newChat(){
  chatHistory=[];allMessages=[];
  speechSynthesis.cancel();
  if(currentController)currentController.abort();
  document.getElementById('chatArea').innerHTML=`<div class="welcome" id="welcome"><div class="emoji">🤖</div><h2>AI 語音助手</h2><p>支援語音對話 & 即時網路搜尋</p><div class="presets"><div class="preset-card" onclick="applyPreset('chat')"><div class="p-icon">💬</div><div class="p-name">一般聊天</div></div><div class="preset-card" onclick="applyPreset('search')"><div class="p-icon">🔍</div><div class="p-name">搜尋助手</div></div><div class="preset-card" onclick="applyPreset('code')"><div class="p-icon">💻</div><div class="p-name">程式助手</div></div><div class="preset-card" onclick="applyPreset('write')"><div class="p-icon">📝</div><div class="p-name">寫作助手</div></div><div class="preset-card" onclick="applyPreset('translate')"><div class="p-icon">🌐</div><div class="p-name">翻譯助手</div></div><div class="preset-card" onclick="applyPreset('data')"><div class="p-icon">📊</div><div class="p-name">資料分析</div></div></div></div>`;
}

/* ===== 匯出對話 ===== */
function exportChat(){
  if(!allMessages.length){addSystemMsg('目前沒有對話可匯出');return}
  let md='# AI 語音助手對話紀錄\n> '+new Date().toLocaleString('zh-TW')+'\n\n';
  allMessages.forEach(m=>{md+=m.role==='user'?`## 👤 你\n${m.content}\n\n`:`## 🤖 AI\n${m.content}\n\n`});
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`chat-${Date.now()}.md`;
  a.click();
  addSystemMsg('📤 對話已匯出');
}

/* ===== 預設角色 ===== */
function applyPreset(type){
  document.getElementById('welcome')?.remove();
  const presets={
    chat:{prompt:'你是一個友善的 AI 助手，請用繁體中文回答，簡潔扼要。',mode:'auto',msg:'💬 一般聊天模式'},
    search:{prompt:'你是一個新聞搜尋助手。請根據網路搜尋結果提供最新、準確的資訊，並標註來源。',mode:'always',msg:'🔍 搜尋助手模式 — 每次都會搜尋最新資料'},
    code:{prompt:'你是一個資深程式設計師。請用繁體中文解釋，提供完整可執行的程式碼，使用 markdown code block。支援 Python, JavaScript, Java 等語言。',mode:'auto',msg:'💻 程式助手模式'},
    write:{prompt:'你是一個專業寫作助手。擅長文章撰寫、校稿、潤稿、文案發想。請用繁體中文回覆，注重文字品質與結構。',mode:'never',msg:'📝 寫作助手模式'},
    translate:{prompt:'你是一個專業翻譯。使用者輸入任何語言的文字，你自動偵測語言並翻譯成另一種語言（中↔英為主）。提供直譯和意譯兩個版本。',mode:'never',msg:'🌐 翻譯助手模式'},
    data:{prompt:'你是一個資料分析專家。擅長整理數據、製作表格、分析趨勢。請用繁體中文回覆，善用 markdown 表格呈現資料。',mode:'auto',msg:'📊 資料分析模式'}
  };
  const p=presets[type];
  localStorage.setItem('reply_style',p.prompt);
  searchMode=p.mode;
  localStorage.setItem('search_mode',p.mode);
  updateSearchBtn();
  chatHistory=[];
  addSystemMsg(p.msg);
}

/* ===== 語音辨識 ===== */
function initSpeechRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang='zh-TW';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.onresult=e=>{
    let t='';
    for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    document.getElementById('userInput').value=t;
    if(e.results[e.results.length-1].isFinal)setTimeout(()=>sendMessage(),300);
  };
  recognition.onend=()=>{isRecording=false;document.getElementById('micBtn').classList.remove('recording')};
  recognition.onerror=e=>{isRecording=false;document.getElementById('micBtn').classList.remove('recording');if(e.error==='not-allowed')addSystemMsg('⚠️ 請允許麥克風權限')};
}
function toggleMic(){
  if(!recognition){addSystemMsg('⚠️ 你的瀏覽器不支援語音辨識');return}
  if(isRecording){recognition.stop()}else{isRecording=true;document.getElementById('micBtn').classList.add('recording');document.getElementById('userInput').value='';recognition.start()}
}

/* ===== 網路搜尋（DuckDuckGo via CORS proxy）===== */
async function webSearch(query){
  const ddgUrl='https://html.duckduckgo.com/html/?q='+encodeURIComponent(query);
  for(const proxy of CORS_PROXIES){
    try{
      const r=await fetch(proxy+encodeURIComponent(ddgUrl),{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      const html=await r.text();
      const doc=new DOMParser().parseFromString(html,'text/html');
      const results=[];
      doc.querySelectorAll('.result').forEach((el,i)=>{
        if(i>=5)return;
        const a=el.querySelector('.result__a');
        const s=el.querySelector('.result__snippet');
        if(a)results.push({title:a.textContent.trim(),url:a.href||'',snippet:s?s.textContent.trim():''});
      });
      if(results.length)return results;
    }catch(e){continue}
  }
  return null;
}
function shouldSearch(text){
  if(searchMode==='always')return true;
  if(searchMode==='never')return false;
  return SEARCH_KEYWORDS.test(text);
}

/* ===== 訊息顯示 ===== */
function addMsg(role,text){
  document.getElementById('welcome')?.remove();
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  if(role==='ai')div.innerHTML=`<div class="label">AI</div><span class="content"></span>`;
  else div.textContent=text;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}
function addSystemMsg(text){
  document.getElementById('welcome')?.remove();
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg system';
  div.textContent=text;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function addSearchCard(results){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='search-card';
  let html=`<div class="search-toggle" onclick="this.nextElementSibling.classList.toggle('open')">📰 找到 ${results.length} 筆搜尋結果（點擊展開）</div><div class="search-details">`;
  results.forEach(r=>{html+=`<div class="search-item"><div class="s-title">${r.title}</div><div class="s-snip">${r.snippet}</div></div>`});
  html+='</div>';
  div.innerHTML=html;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

/* ===== 建構系統提示詞 ===== */
function buildSystemPrompt(searchContext){
  const aboutMe=localStorage.getItem('about_me')||'';
  const style=localStorage.getItem('reply_style')||'用繁體中文、簡潔扼要、有條理';
  let p='你是 AI 語音助手。\n';
  if(aboutMe)p+=`\n使用者資訊：${aboutMe}\n`;
  p+=`\n回覆風格：${style}\n`;
  if(searchContext)p+=`\n以下是最新的網路搜尋結果，請根據這些結果回答使用者的問題，並在適當處標註資料來源。如果搜尋結果不足以回答，請誠實說明。\n\n${searchContext}\n`;
  return p;
}

/* ===== 送出訊息 ===== */
async function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text)return;
  const token=localStorage.getItem('pat_token');
  if(!token){showSettings();return}
  input.value='';
  addMsg('user',text);
  allMessages.push({role:'user',content:text});
  chatHistory.push({role:'user',content:text});
  if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);

  /* 判斷是否搜尋 */
  let searchCtx=null;
  if(shouldSearch(text)){
    addSystemMsg(`🔍 正在搜尋「${text}」...`);
    const res=await webSearch(text);
    if(res&&res.length){
      addSearchCard(res);
      searchCtx=res.map((r,i)=>`[${i+1}] ${r.title}\n${r.snippet}`).join('\n\n');
    }else{addSystemMsg('⚠️ 搜尋無結果，改用 AI 知識回答')}
  }

  /* AI 回應 */
  const aiDiv=addMsg('ai','');
  const contentSpan=aiDiv.querySelector('.content');
  contentSpan.innerHTML='<span class="typing-dot">●</span><span class="typing-dot" style="animation-delay:.2s">●</span><span class="typing-dot" style="animation-delay:.4s">●</span>';
  const model=localStorage.getItem('model')||'gpt-4o-mini';
  const temp=parseFloat(localStorage.getItem('temperature'))||0.7;
  const sysPrompt=buildSystemPrompt(searchCtx);
  const messages=[{role:'system',content:sysPrompt},...chatHistory];

  try{
    if(currentController)currentController.abort();
    currentController=new AbortController();
    const resp=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({model,messages,stream:true,temperature:temp}),signal:currentController.signal});
    if(!resp.ok){const s=resp.status;if(s===401)throw new Error('Token 無效，請到 ⚙️ 設定重新輸入');if(s===429)throw new Error('超過速率限制，請稍後再試');throw new Error(`API 錯誤 (${s})`)}
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let fullText='',buffer='',sentBuf='';
    contentSpan.textContent='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')||line==='data: [DONE]')continue;
        try{
          const j=JSON.parse(line.slice(6));
          const d=j.choices?.[0]?.delta?.content;
          if(d){
            fullText+=d;
            contentSpan.textContent=fullText;
            document.getElementById('chatArea').scrollTop=document.getElementById('chatArea').scrollHeight;
            if(voiceEnabled){
              sentBuf+=d;
              const m=sentBuf.match(/(.*[。！？\!\?\n])(.*)/s);
              if(m){sentBuf=m[2];const u=new SpeechSynthesisUtterance(m[1].trim());u.lang='zh-TW';u.rate=speechRate;speechSynthesis.speak(u)}
            }
          }
        }catch(e){}
      }
    }
    if(voiceEnabled&&sentBuf.trim()){const u=new SpeechSynthesisUtterance(sentBuf.trim());u.lang='zh-TW';u.rate=speechRate;speechSynthesis.speak(u)}
    chatHistory.push({role:'assistant',content:fullText});
    allMessages.push({role:'assistant',content:fullText});
  }catch(err){
    if(err.name==='AbortError')return;
    contentSpan.textContent=`❌ ${err.message}`;
    aiDiv.style.borderColor='#ef444460';
  }
}
</script>
</body>
</html>
